<!DOCTYPE html>
<html lang="pt-BR">

<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Login - Calculo Penal de Precisao</title>
   <link rel="stylesheet" href="../CSS/login.css">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

   <!-- Fonte Playfair Display + Inter -->
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
   <div id="notificacao">notificacao</div>

   <!-- Comeco do codigo do login -->
   <main class="area-login">
      <div class="container-login">

         <!-- Logo e titulo -->
         <div class="topo-login">
            <a href="inicio.html">
               <img src="../Img/logo-branca.png" alt="Logo Cespeds e Lourenco" class="logo-login">
            </a>

            <div class="simbolo-titulo">
               <span class="linha-dourada"></span>
               <span class="balanca">&#9878;</span>
               <span class="linha-dourada"></span>
            </div>

            <p>Sistema de Gest&atilde;o Penal</p>
         </div>

         <!-- Card de autenticacao -->
         <div class="card-login">
            <input type="radio" name="aba" id="aba-entrar" checked>
            <input type="radio" name="aba" id="aba-cadastrar">

            <div class="abas-login">
               <label for="aba-entrar">Entrar</label>
               <label for="aba-cadastrar">Cadastrar</label>
            </div>

            <!-- Formulario entrar -->
            <form action="" class="form form-entrar" id="formEntrar">
               <div class="campo">
                  <label class="form-label">E-mail</label>
                  <input type="email" class="form-control" id="emailLogin" maxlength="255" required>
               </div>

               <div class="campo">
                  <label class="form-label">Senha</label>
                  <div class="senha-container">
                     <input type="password" class="form-control campo-senha" id="senhaLogin" required>
                     <button type="button" class="toggle-senha" data-target="senhaLogin">Ver</button>
                  </div>
               </div>

               <button type="submit" class="confirmar">Entrar</button>
            </form>

            <!-- Formulario cadastrar -->
            <form action="" class="form form-cadastrar" id="formCadastrar">
               <div class="campo">
                  <label class="form-label">Nome completo</label>
                  <input type="text" class="form-control" id="nomeCadastro" maxlength="120" required>
               </div>

               <div class="campo">
                  <label class="form-label">OAB (opcional)</label>
                  <input type="text" class="form-control" id="oabCadastro" maxlength="20" placeholder="SP 123.456">
               </div>

               <div class="campo">
                  <label class="form-label">E-mail</label>
                  <input type="email" class="form-control" id="emailCadastro" maxlength="255" required>
               </div>

               <div class="campo">
                  <label class="form-label">Senha</label>
                  <div class="senha-container">
                     <input type="password" class="form-control campo-senha" id="senhaCadastro" minlength="8" required>
                     <button type="button" class="toggle-senha" data-target="senhaCadastro">Ver</button>
                  </div>
               </div>

               <button type="submit" class="confirmar">Criar conta</button>
            </form>

            <!-- Divisor -->
            <div class="divisor-login">
               <span></span>
               <p>ou</p>
               <span></span>
            </div>

            <!-- Botao Google -->
            <button type="button" class="botao-google" id="botaoGoogle">
               <svg class="icone-google" viewBox="0 0 24 24">
                  <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                  <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                  <path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.83z" />
                  <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z" />
               </svg>
               Entrar com Google
            </button>

            <a href="inicio.html" class="voltar">Voltar para o in&iacute;cio</a>
         </div>
      </div>
   </main>
   <!-- Fim do codigo do login -->

   <script src="../JS/login.js"></script>
</body>

</html>
